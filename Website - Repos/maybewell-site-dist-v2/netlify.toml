# This site's files sit at the same level as this config —
# no "publish" directory needed; Netlify already deploys this folder as-is.

[functions]
  directory = "netlify/functions"
  # PDFs bundled here are NOT publicly served — only readable from inside
  # the function at runtime. download.js gates access with a signed token.
  included_files = ["netlify/functions/_assets/**"]

[[redirects]]
  from = "https://www.maybewellbooks.com/*"
  to = "https://maybewellbooks.com/:splat"
  status = 301
  force = true

# Missing asset files must 404, NOT fall through to the SPA rewrite below.
# Without this, a preview URL requested before its file exists gets served
# index.html stamped with the previews' long-lived cache header — poisoning
# that URL in the visitor's browser cache long after the real file deploys
# (this actually happened on 2026-07-17).
[[redirects]]
  from = "/assets/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    # NOT "immutable" — this project doesn't rename bundle files on every
    # content change (no real build-hash pipeline), so a browser must
    # always revalidate rather than trust a cached copy for a year.
    # (Book preview JPEGs never get overwritten in place — only added new
    # — so they're safe to cache longer; see the override below.)
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/previews/*"
  [headers.values]
    # One day, NOT immutable-for-a-year: "append-only" turned out to be an
    # insufficient guarantee — a URL can be requested (and its response
    # cached) before the file exists. A daily revalidation costs a few 304s
    # and makes any cache poisoning self-healing within 24h.
    Cache-Control = "public, max-age=86400"
